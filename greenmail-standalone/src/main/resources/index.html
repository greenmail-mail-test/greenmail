<!DOCTYPE html>
<html lang="en">
<head>
    <title>GreenMail API</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="css/swagger-ui.css"/>


    <style>
        footer {
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
<div id="swagger-ui"></div>
<script src="js/swagger-ui-bundle.js" crossorigin></script>
<script src="js/swagger-ui-standalone-preset.js" crossorigin></script>
<script>
    window.onload = () => {
        window.ui = SwaggerUIBundle({
            url: 'greenmail-openapi.yml',
            dom_id: '#swagger-ui',
        });
    };
</script>

<footer class="swagger-ui"><p>GreenMail <a href="https://greenmail-mail-test.github.io/greenmail/">doc</a> | <a
    href="https://github.com/greenmail-mail-test/greenmail">Github</a></p></footer>
</body>
</html>
